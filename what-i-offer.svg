<svg width="860" height="520" viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif;">

  <!-- Background -->
  <rect width="860" height="520" fill="#0d1117" rx="12"/>

  <!-- ─── ROW 1 ─── -->

  <!-- Card 1: Wireframing -->
  <rect x="20" y="20" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: wireframe layout -->
  <rect x="46" y="50" width="44" height="32" rx="4" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="46" y="88" width="20" height="36" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="70" y="88" width="20" height="16" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="70" y="108" width="20" height="16" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <!-- Title -->
  <text x="46" y="158" font-size="15" font-weight="700" fill="#f0f6fc">Wireframing</text>
  <!-- Description -->
  <text x="46" y="179" font-size="12" fill="#8b949e">Creating low and high-fidelity</text>
  <text x="46" y="195" font-size="12" fill="#8b949e">wireframes to visualize structure</text>
  <text x="46" y="211" font-size="12" fill="#8b949e">and user flow.</text>

  <!-- Card 2: Prototyping -->
  <rect x="300" y="20" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: prototype / connected screens -->
  <rect x="326" y="48" width="26" height="20" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="362" y="56" width="26" height="20" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="326" y="78" width="26" height="20" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="352" y1="58" x2="362" y2="62" stroke="#c9d1d9" stroke-width="1.2"/>
  <line x1="352" y1="88" x2="362" y2="68" stroke="#c9d1d9" stroke-width="1.2"/>
  <!-- Title -->
  <text x="326" y="158" font-size="15" font-weight="700" fill="#f0f6fc">Prototyping</text>
  <!-- Description -->
  <text x="326" y="179" font-size="12" fill="#8b949e">Building interactive prototypes</text>
  <text x="326" y="195" font-size="12" fill="#8b949e">that bring your ideas to life and</text>
  <text x="326" y="211" font-size="12" fill="#8b949e">allow for user testing.</text>

  <!-- Card 3: Visual Design -->
  <rect x="580" y="20" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: palette / star node -->
  <circle cx="636" cy="72" r="18" fill="none" stroke="#c9d1d9" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="636" cy="72" r="6" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <circle cx="622" cy="58" r="3" fill="none" stroke="#c9d1d9" stroke-width="1.2"/>
  <circle cx="652" cy="58" r="3" fill="none" stroke="#c9d1d9" stroke-width="1.2"/>
  <circle cx="654" cy="84" r="3" fill="none" stroke="#c9d1d9" stroke-width="1.2"/>
  <!-- Title -->
  <text x="606" y="158" font-size="15" font-weight="700" fill="#f0f6fc">Visual Design</text>
  <!-- Description -->
  <text x="606" y="179" font-size="12" fill="#8b949e">Crafting beautiful, modern</text>
  <text x="606" y="195" font-size="12" fill="#8b949e">interfaces with attention to</text>
  <text x="606" y="211" font-size="12" fill="#8b949e">typography, color and spacing.</text>

  <!-- ─── ROW 2 ─── -->

  <!-- Card 4: Design System Creation -->
  <rect x="20" y="260" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: monitor + settings -->
  <rect x="44" y="288" width="40" height="28" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="64" y1="316" x2="64" y2="322" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="56" y1="322" x2="72" y2="322" stroke="#c9d1d9" stroke-width="1.5"/>
  <circle cx="80" cy="295" r="6" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="80" y1="285" x2="80" y2="289" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="80" y1="301" x2="80" y2="305" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="70" y1="295" x2="74" y2="295" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="86" y1="295" x2="90" y2="295" stroke="#c9d1d9" stroke-width="1.5"/>
  <!-- Title -->
  <text x="46" y="398" font-size="15" font-weight="700" fill="#f0f6fc">Design System</text>
  <text x="46" y="416" font-size="15" font-weight="700" fill="#f0f6fc">Creation</text>
  <!-- Description -->
  <text x="46" y="438" font-size="12" fill="#8b949e">Building scalable design systems</text>
  <text x="46" y="454" font-size="12" fill="#8b949e">with reusable components and</text>
  <text x="46" y="470" font-size="12" fill="#8b949e">guidelines for consistency.</text>

  <!-- Card 5: UI/UX Audit -->
  <rect x="300" y="260" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: clipboard + magnifier -->
  <rect x="324" y="286" width="28" height="34" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="329" y1="297" x2="347" y2="297" stroke="#c9d1d9" stroke-width="1.2"/>
  <line x1="329" y1="305" x2="347" y2="305" stroke="#c9d1d9" stroke-width="1.2"/>
  <line x1="329" y1="313" x2="341" y2="313" stroke="#c9d1d9" stroke-width="1.2"/>
  <circle cx="360" cy="310" r="7" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <line x1="365" y1="315" x2="371" y2="322" stroke="#c9d1d9" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Title -->
  <text x="326" y="398" font-size="15" font-weight="700" fill="#f0f6fc">UI/UX Audit</text>
  <!-- Description -->
  <text x="326" y="419" font-size="12" fill="#8b949e">Evaluating existing interfaces to</text>
  <text x="326" y="435" font-size="12" fill="#8b949e">identify usability issues and</text>
  <text x="326" y="451" font-size="12" fill="#8b949e">provide actionable recommendations.</text>

  <!-- Card 6: Responsive Design -->
  <rect x="580" y="260" width="260" height="220" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Icon: desktop + tablet + phone -->
  <rect x="604" y="289" width="36" height="26" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
  <rect x="645" y="293" width="22" height="18" rx="2" fill="none" stroke="#c9d1d9" stroke-width="1.3"/>
  <rect x="672" y="296" width="13" height="20" rx="2" fill="none" stroke="#c9d1d9" stroke-width="1.2"/>
  <line x1="614" y1="315" x2="614" y2="319" stroke="#c9d1d9" stroke-width="1.4"/>
  <line x1="609" y1="319" x2="619" y2="319" stroke="#c9d1d9" stroke-width="1.4"/>
  <!-- Title -->
  <text x="606" y="398" font-size="15" font-weight="700" fill="#f0f6fc">Responsive Design</text>
  <!-- Description -->
  <text x="606" y="419" font-size="12" fill="#8b949e">Ensuring seamless experiences</text>
  <text x="606" y="435" font-size="12" fill="#8b949e">across all devices with</text>
  <text x="606" y="451" font-size="12" fill="#8b949e">mobile-first design approaches.</text>

</svg>
